name: Data correction
description: Correct an existing record.
title: "[Correction]: "
labels: ["data", "correction"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include email addresses, order IDs, payment card numbers, billing addresses, account screenshots, cookies, tokens, private repository links, local paths, or payment-workaround guidance.
  - type: input
    id: record
    attributes:
      label: Record ID
      placeholder: us-plus-web-monthly-2026-06-03
    validations:
      required: true
  - type: textarea
    id: correction
    attributes:
      label: Correction
      description: Explain what should change, why it is wrong today, and whether confidence/status should change.
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: Source
      description: Provide a reliable public source or redacted evidence. Remove private data and do not link private repositories.
    validations:
      required: true
  - type: input
    id: verified_at
    attributes:
      label: Verification date
      description: Date when you checked the source.
      placeholder: 2026-06-04
    validations:
      required: true
