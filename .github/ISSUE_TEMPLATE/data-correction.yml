name: Data correction
description: Correct an existing record.
title: "[Correction]: "
labels: ["data", "correction"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include email addresses, order IDs, payment card numbers, billing addresses, account screenshots, cookies, tokens, private repository links, local paths, or payment-workaround guidance.
  - type: input
    id: record
    attributes:
      label: Record ID
      placeholder: us-plus-web-monthly-2026-06-03
    validations:
      required: true
  - type: textarea
    id: correction
    attributes:
      label: Correction
      description: Explain what should change and why.
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: Source
      description: Provide a reliable public source or redacted evidence. Remove private data and do not link private repositories.
    validations:
      required: true
