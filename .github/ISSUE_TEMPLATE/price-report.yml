name: Price report
description: Submit a verified price record.
title: "[Price]: "
labels: ["data", "price-report"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include email addresses, order IDs, payment card numbers, billing addresses, account screenshots, cookies, tokens, private repository links, local paths, or payment-workaround guidance.
  - type: input
    id: region
    attributes:
      label: Region
      description: Country or region name and code.
      placeholder: United States (US)
    validations:
      required: true
  - type: input
    id: plan
    attributes:
      label: Plan
      placeholder: Plus, Pro 100, Business
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: Web, iOS, Android
    validations:
      required: true
  - type: input
    id: price
    attributes:
      label: Local price and currency
      placeholder: 20 USD / month
    validations:
      required: true
  - type: dropdown
    id: source_type
    attributes:
      label: Source type
      description: Choose the strongest source category you can support.
      options:
        - Official OpenAI page
        - Official App Store listing
        - Official Google Play listing
        - Redacted checkout evidence
        - Public third-party index
        - Other public source
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: Source
      description: Official public URL or redacted evidence. Remove private data and do not link private repositories.
    validations:
      required: true
  - type: input
    id: verified_at
    attributes:
      label: Verification date
      description: Date when you checked the source.
      placeholder: 2026-06-04
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Tax, billing cycle, uncertainty, and anything the source does not prove.
