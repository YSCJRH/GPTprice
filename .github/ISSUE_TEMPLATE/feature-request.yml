name: Feature request
description: Suggest a product or data-maintenance improvement.
title: "[Feature]: "
labels: ["feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful version.
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundaries
      options:
        - label: This does not add cross-region purchase guidance.
          required: true
        - label: This does not add payment workaround guidance.
          required: true
